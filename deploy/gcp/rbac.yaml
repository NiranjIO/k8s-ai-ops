apiVersion: v1
kind: ServiceAccount
metadata:
  name: ai-bot-sa
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ai-bot-role
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "events"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ai-bot-binding
subjects:
  - kind: ServiceAccount
    name: ai-bot-sa
    namespace: default
roleRef:
  kind: ClusterRole
  name: ai-bot-role
  apiGroup: rbac.authorization.k8s.io
